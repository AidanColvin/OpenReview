<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenReview V37</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <style>
    .nav-tab { font-size: 0.875rem; color: #666; padding: 0.5rem 1rem; cursor: pointer; border: none; background: none; font-weight: 500; }
    .nav-tab.active { color: #000; font-weight: 700; border-bottom: 2px solid #000; }
    .or-wordmark { font-family: serif; font-weight: bold; }
    .accent { color: #c4622d; }
    
    /* Search Bar & Find Button Polish */
    .search-input { flex: 1; border: 1px solid #e8e4df; border-radius: 8px; padding: 0.7rem 1rem; outline: none; font-size: 0.95rem; }
    .btn-find { background: #1a1a1a; color: #fff; font-weight: 700; padding: 0 1.5rem; border-radius: 8px; border: none; cursor: pointer; height: 46px; font-size: 0.9rem; }
    
    .engine-btn { font-size: 0.72rem; padding: 4px 12px; border-radius: 20px; border: 1px solid #e8e4df; background: #fff; color: #666; cursor: pointer; }
    .engine-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    
    .vis-btn { flex: 1; font-size: 0.75rem; padding: 0.6rem; border-radius: 8px; border: 1px solid #e8e4df; background: #fff; color: #666; cursor: pointer; font-weight: 600; }
    .vis-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .or-input { width: 100%; border: 1px solid #e8e4df; border-radius: 8px; padding: 0.6rem 0.8rem; font-size: 0.875rem; outline: none; }
    .or-overlay { background: rgba(250, 249, 247, 0.98); backdrop-filter: blur(10px); }
    
    /* Screening 3-Pane Layout */
    .screen-layout { display: grid; grid-template-columns: 220px 340px 1fr; height: calc(100vh - 52px); overflow: hidden; }
    .pane { height: 100%; overflow-y: auto; border-right: 1px solid #e8e4df; background: #fff; }
    .pane-sidebar { background: #faf9f7; padding: 1.5rem; }
    .pane-list { background: #fff; }
    .pane-reader { background: #fff; padding: 3rem; }
    
    .article-card { padding: 1rem; border-bottom: 1px solid #f0ece8; cursor: pointer; border-left: 4px solid transparent; }
    .article-card.selected { background: #fdf0ea; border-left-color: #c4622d; }
    .status-pill { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 4px; }
    .status-unscreened { background: #eee; color: #888; }
  </style>
</head>
<body style="background:#faf9f7;min-height:100vh">

<div id="splash-screen" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-[200]">
  <div class="flex items-center gap-3">
    <img src="%BASE_URL%openreview_icon.png" alt="" class="w-10 h-10 rounded-full" />
    <span class="or-wordmark text-4xl"><span>Open</span><span class="accent">Review</span></span>
  </div>
</div>

<div id="main-app" class="hidden flex flex-col" style="min-height:100vh">
  <nav style="height:52px;background:#fff;border-bottom:1px solid #e8e4df;position:sticky;top:0;z-index:50" class="flex items-center px-6">
    <div class="flex items-center gap-2">
      <img src="%BASE_URL%openreview_icon.png" alt="OpenReview" style="width:22px;height:22px;border-radius:50%;" />
      <span class="or-wordmark" style="font-size:1.1rem"><span>Open</span><span class="accent">Review</span></span>
    </div>
    <div class="flex-1"></div>
    <div class="flex items-center gap-1">
      <button id="nav-import" class="nav-tab active">Import</button>
      <button id="nav-screening" class="nav-tab">Screening</button>
      <button id="nav-analysis" class="nav-tab">Analysis</button>
      <button id="nav-export" class="nav-tab">Export</button>
      <button id="btn-shortcuts" style="font-size:0.8rem;color:#9e9e9e;margin-left:1rem;background:none;border:none;cursor:pointer">Shortcuts (?)</button>
    </div>
  </nav>

  <div id="home-screen" class="hidden fixed inset-0 z-40 flex items-center justify-center or-overlay" style="top:52px;">
    <div style="background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.08);width:100%;max-width:560px;margin:1rem;padding:2.5rem">
      <h2 class="or-wordmark" style="font-size:1.5rem;margin-bottom:1.5rem">Project Startup</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem">
        <div>
          <label style="display:block;font-size:0.7rem;font-weight:700;color:#9e9e9e;text-transform:uppercase;margin-bottom:6px">Project Name *</label>
          <input id="input-review-title" type="text" placeholder="e.g. Chronic Pain Review" class="or-input" />
        </div>
        <div>
          <label style="display:block;font-size:0.7rem;font-weight:700;color:#9e9e9e;text-transform:uppercase;margin-bottom:6px">Visibility</label>
          <div id="vis-selector" style="display:flex; gap:0.4rem;">
            <button class="vis-btn active" data-vis="Private">Private</button>
            <button class="vis-btn" data-vis="Shared">Shared</button>
            <button class="vis-btn" data-vis="Public">Public</button>
          </div>
        </div>
      </div>
      <div style="margin-bottom:1.5rem">
        <label style="display:block;font-size:0.7rem;font-weight:700;color:#9e9e9e;text-transform:uppercase;margin-bottom:6px">Description</label>
        <textarea id="input-review-description" rows="3" class="or-input" style="resize:none" placeholder="Briefly describe the research objective..."></textarea>
      </div>
      <div style="display:flex;justify-content:flex-end">
        <button id="btn-create-review" style="background:#1a1a1a;color:#fff;font-weight:600;font-size:0.9rem;padding:0.7rem 2.5rem;border-radius:10px;border:none;cursor:pointer">Start Review</button>
      </div>
    </div>
  </div>

  <div id="import-screen" class="hidden flex-1" style="padding:2rem 2.5rem;max-width:1100px;margin:0 auto;width:100%">
    <div style="display:grid;grid-template-columns:400px 1fr;gap:2.5rem;align-items:start">
      <div>
        <h1 id="review-title-display" class="or-wordmark" style="font-size:1.75rem;margin-bottom:0.25rem">New Review</h1>
        <button id="btn-inclusion-criteria" style="font-size:0.8rem;color:#c4622d;font-weight:500;background:none;border:none;cursor:pointer;padding:0;margin-bottom:1rem">Inclusion criteria →</button>
        <label id="drop-zone" style="display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed #d0cbc4;border-radius:10px;padding:22px;cursor:pointer;text-align:center;margin-bottom:18px;min-height:110px">
          <p style="font-size:14px;color:#555;margin-bottom:10px;font-weight:500">Drop PDF here or click to upload</p>
          <input type="file" id="file-input" accept=".pdf,.docx,.ris,.bib" multiple style="display:none" />
        </label>
        <div style="border:1px solid #e8e4df;border-radius:10px;overflow:hidden;background:#fff">
          <div style="padding:0.75rem 1rem;border-bottom:1px solid #f0ece8;font-weight:600;font-size:0.875rem">Articles</div>
          <div id="import-article-list" style="max-height:300px;overflow-y:auto"></div>
        </div>
      </div>
      <div>
        <p style="font-size:0.7rem;font-weight:700;text-transform:uppercase;color:#9e9e9e;margin-bottom:0.5rem">Search Papers</p>
        <div style="display:flex;gap:0.75rem;margin-bottom:1rem;align-items:center;">
          <input id="crossref-input" type="text" placeholder="Title, author, keyword..." class="search-input" />
          <button id="btn-crossref-search" class="btn-find">Find</button>
        </div>
        <div id="search-engines" style="display:flex; gap:0.4rem; margin-bottom:1rem;">
          <button class="engine-btn active" data-engine="pubmed">PubMed</button>
          <button class="engine-btn" data-engine="scholar">Google Scholar</button>
        </div>
        <div id="crossref-results" style="border:1px solid #e8e4df;border-radius:10px;background:#fff;max-height:350px;overflow-y:auto"></div>
        <div style="display:flex;gap:0.75rem;margin-top:1.5rem;align-items:center;">
          <div style="background:#fff; border:1px solid #e8e4df; padding:10px 15px; border-radius:10px; text-align:center;">
            <span id="stat-articles" style="display:block; font-size:1.1rem; font-weight:700;">0</span>
            <span style="font-size:0.6rem; color:#9e9e9e; text-transform:uppercase;">articles</span>
          </div>
          <button id="btn-start-screening" style="flex:1; background:#1a1a1a; color:#fff; font-weight:700; border-radius:10px; border:none; cursor:pointer; height:48px;">Begin Screening</button>
        </div>
      </div>
    </div>
  </div>

  <div id="screening-screen" class="hidden flex-1">
    <div class="screen-layout">
      <aside class="pane pane-sidebar">
        <label class="filter-label" style="font-size:0.65rem; font-weight:700; color:#9e9e9e; text-transform:uppercase;">Quick Actions</label>
        <button id="btn-undo" style="width:100%; font-size:0.75rem; background:#fff; border:1px solid #e8e4df; padding:0.5rem; border-radius:6px; cursor:pointer; margin-top:0.5rem;">Undo (⌘Z)</button>
      </aside>
      <main class="pane pane-list">
        <div id="screening-article-list"></div>
      </main>
      <section class="pane pane-reader">
        <div id="reader-empty" style="text-align:center; margin-top:5rem; color:#9e9e9e;">Select an article to begin</div>
        <div id="reader-content" class="hidden">
          <div id="reader-status-box"></div>
          <h2 id="reader-title" class="or-wordmark" style="font-size:1.8rem; line-height:1.2; margin:1rem 0;"></h2>
          <p id="reader-meta" style="font-size:0.95rem; color:#666; margin-bottom:2rem; border-bottom:1px solid #eee; padding-bottom:1.5rem;"></p>
          <div id="reader-abstract" style="font-size:1.15rem; line-height:1.7; color:#1a1a1a; white-space:pre-wrap;"></div>
        </div>
      </section>
    </div>
  </div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
