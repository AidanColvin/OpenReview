<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenReview V24</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <style>
    .nav-tab { font-size: 0.875rem; color: #666; padding: 0.5rem 1rem; cursor: pointer; border: none; background: none; font-weight: 500; }
    .nav-tab.active { color: #000; font-weight: 700; border-bottom: 2px solid #000; }
    .nav-tab:hover { color: #000; }
    .or-wordmark { font-family: serif; font-weight: bold; }
    .accent { color: #c4622d; }
    .engine-btn { font-size: 0.72rem; padding: 4px 12px; border-radius: 20px; border: 1px solid #e8e4df; background: #fff; color: #666; cursor: pointer; transition: all 0.2s; }
    .engine-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  </style>
  <script type="module" crossorigin src="/OpenReview/assets/index-zjnEUWOK.js"></script>
</head>
<body style="background:#faf9f7;min-height:100vh">
<div id="splash-screen" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-[200]">
  <div class="flex items-center gap-3">
    <img src="/OpenReview/openreview_icon.png" alt="" class="w-10 h-10 rounded-full" />
    <span class="or-wordmark text-4xl"><span>Open</span><span class="accent">Review</span></span>
  </div>
</div>
<div id="main-app" class="hidden flex flex-col" style="min-height:100vh">
  <nav style="height:52px;background:#fff;border-bottom:1px solid #e8e4df;position:sticky;top:0;z-index:50" class="flex items-center px-6">
    <div class="flex items-center gap-2">
      <img src="/OpenReview/openreview_icon.png" alt="OpenReview" style="width:22px;height:22px;border-radius:50%;" />
      <span class="or-wordmark" style="font-size:1.1rem"><span>Open</span><span class="accent">Review</span></span>
    </div>
    <div class="flex-1"></div>
    <div class="flex items-center gap-1">
      <button id="nav-import" class="nav-tab active">Import</button>
      <button id="nav-screening" class="nav-tab">Screening</button>
      <button id="nav-analysis" class="nav-tab">Analysis</button>
      <button id="nav-export" class="nav-tab">Export</button>
      <button id="btn-shortcuts" style="font-size:0.8rem;color:#9e9e9e;margin-left:1rem;background:none;border:none;cursor:pointer">Shortcuts (?)</button>
    </div>
  </nav>

  <div id="import-screen" class="hidden flex-1" style="padding:2rem 2.5rem;max-width:1100px;margin:0 auto;width:100%">
    <div style="display:grid;grid-template-columns:420px 1fr;gap:2.5rem;align-items:start">
      <div>
        <h1 id="review-title-display" class="or-wordmark" style="font-size:1.75rem;line-height:1.2;margin-bottom:0.25rem">New Review</h1>
        <button id="btn-inclusion-criteria" style="font-size:0.8rem;color:#c4622d;font-weight:500;background:none;border:none;cursor:pointer;padding:0;margin-bottom:1rem">Inclusion criteria →</button>
        <label id="drop-zone" style="display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed #d0cbc4;border-radius:10px;padding:22px 16px;cursor:pointer;text-align:center;margin-bottom:18px;min-height:110px">
          <p style="font-size:14px;color:#555;margin-bottom:10px;font-weight:500">Drop PDF here or click to upload</p>
          <input type="file" id="file-input" accept=".pdf,.docx,.ris,.bib" multiple style="display:none" />
        </label>
        <div style="border:1px solid #e8e4df;border-radius:10px;overflow:hidden;background:#fff">
          <div style="padding:0.75rem 1rem;border-bottom:1px solid #f0ece8;font-weight:600;font-size:0.875rem">Articles</div>
          <div id="import-article-list" style="max-height:320px;overflow-y:auto"></div>
        </div>
      </div>

      <div>
        <p style="font-size:0.7rem;font-weight:700;text-transform:uppercase;color:#9e9e9e;margin-bottom:0.5rem">Search Papers</p>
        <div style="display:flex;gap:0.5rem;margin-bottom:1rem">
          <input id="crossref-input" type="text" placeholder="Title, author, keyword..." style="flex:1; border:1px solid #e8e4df; border-radius:7px; padding:0.5rem; outline:none;" />
          <button id="btn-crossref-search" style="background:#1a1a1a;color:#fff;font-weight:600;font-size:0.875rem;padding:0.5rem 1.25rem;border-radius:7px;border:none;cursor:pointer">Find</button>
        </div>
        <div id="search-engines" style="display:flex; gap:0.4rem; margin-bottom:1rem; flex-wrap:wrap;">
          <button class="engine-btn active" data-engine="pubmed">PubMed</button>
          <button class="engine-btn" data-engine="embase">Embase</button>
          <button class="engine-btn" data-engine="cochrane">Cochrane</button>
          <button class="engine-btn" data-engine="scholar">Google Scholar</button>
        </div>
        <div id="crossref-results" style="border:1px solid #e8e4df;border-radius:10px;background:#fff;max-height:350px;overflow-y:auto"></div>
        <div style="display:flex;gap:0.75rem;margin-top:1.25rem;">
          <div style="flex:1; background:#fff; border:1px solid #e8e4df; padding:10px; border-radius:10px; text-align:center;">
            <span id="stat-articles" style="display:block; font-size:1.25rem; font-weight:700;">0</span>
            <span style="font-size:0.7rem; color:#9e9e9e; text-transform:uppercase;">articles</span>
          </div>
          <button id="btn-start-screening" disabled style="flex:2; background:#e8e4df; color:#9e9e9e; font-weight:700; border-radius:10px; border:none; cursor:not-allowed;">Begin Screening</button>
        </div>
      </div>

      <div style="grid-column: 1 / -1; margin-top: 1rem; border-top: 1px solid #e8e4df; padding-top: 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem;">
        <div>
          <div style="width:100%; font-weight:700; font-size:0.95rem; padding:0.75rem; border-radius:8px; border: 1px solid rgba(85, 107, 85, 0.2); background:rgba(85, 107, 85, 0.05); color:#000; margin-bottom: 1rem; text-align:center;">Inclusion Criteria</div>
          <input id="input-inclusion" type="text" placeholder="Type criteria & press Enter..." style="width:100%; border:1px solid #e8e4df; border-radius:7px; padding:0.6rem; font-size:0.875rem; outline:none; margin-bottom: 0.5rem;" />
          <div id="list-inclusion" style="display:flex; flex-direction:column; gap:0.4rem;"></div>
        </div>
        <div>
          <div style="width:100%; font-weight:700; font-size:0.95rem; padding:0.75rem; border-radius:8px; border: 1px solid rgba(128, 0, 0, 0.2); background:rgba(128, 0, 0, 0.05); color:#000; margin-bottom: 1rem; text-align:center;">Exclusion Criteria</div>
          <input id="input-exclusion" type="text" placeholder="Type criteria & press Enter..." style="width:100%; border:1px solid #e8e4df; border-radius:7px; padding:0.6rem; font-size:0.875rem; outline:none; margin-bottom: 0.5rem;" />
          <div id="list-exclusion" style="display:flex; flex-direction:column; gap:0.4rem;"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="screening-screen" class="hidden flex-1"><div style="padding:3rem; text-align:center;">Screening View Active.</div></div>
  <div id="analysis-screen" class="hidden flex-1"><div style="padding:3rem; text-align:center;">Analysis View Active.</div></div>
  <div id="export-screen" class="hidden flex-1"><div style="padding:3rem; text-align:center;">Export View Active.</div></div>
</div>
</body>
</html>
